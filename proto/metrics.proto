syntax = "proto3";

package metrics;

option go_package = "github.com/jethikaviduruwan/sentinel/proto";

// System-level metrics (CPU, memory, disk)
message SystemMetrics {
  string server_id   = 1;
  int64  timestamp   = 2;
  double cpu_percent = 3;
  uint64 mem_total   = 4;
  uint64 mem_used    = 5;
  uint64 mem_free    = 6;
  uint64 disk_total  = 7;
  uint64 disk_used   = 8;
  uint64 disk_free   = 9;
}

// Per-service metrics
message ServiceMetric {
  string server_id   = 1;
  int64  timestamp   = 2;
  string name        = 3;
  bool   running     = 4;
  double cpu_percent = 5;
  uint64 mem_rss     = 6;
}

// A single payload streaming from Agent to HQ
message MetricPayload {
  SystemMetrics          system   = 1;
  repeated ServiceMetric services = 2;
}

// Empty response — HQ just acknowledges receipt
message Ack {
  bool ok = 1;
}

// The gRPC service definition
service MetricsService {
  // Agent streams metrics, HQ acknowledges at the end
  rpc StreamMetrics (stream MetricPayload) returns (Ack);
}