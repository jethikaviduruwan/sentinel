version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sentinel-db
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel123
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./hq/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  hq:
    build:
      context: .
      dockerfile: hq/Dockerfile
    container_name: sentinel-hq
    environment:
      DB_CONN: "postgres://sentinel:sentinel123@postgres:5432/sentinel"
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: sentinel-agent
    environment:
      HQ_ADDRESS: "hq:50051"
    depends_on:
      - hq

volumes:
  pgdata: